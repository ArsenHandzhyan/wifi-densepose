# Historical Home Assistant backup snapshot kept for reference.
# Runtime-generated `.storage`, `.db`, `.log`, and lock files under backup trees
# are archival runtime artifacts, not canonical project configuration.
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

input_boolean:
  fp2_presence:
    name: FP2 Presence
    icon: mdi:walk
