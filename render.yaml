services:
  - type: web
    name: wifi-densepose-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    healthCheckPath: /health/live
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: FP2_ENABLED
        value: "true"
      - key: ENABLE_REAL_TIME_PROCESSING
        value: "false"
      - key: AQARA_EMAIL
        sync: false
      - key: AQARA_PASSWORD
        sync: false
      - key: AQARA_API_DOMAIN
        value: open-ger.aqara.com
      - key: AQARA_APP_ID
        sync: false
      - key: AQARA_APP_KEY
        sync: false
      - key: AQARA_KEY_ID
        sync: false
      - key: AQARA_ACCESS_TOKEN
        sync: false
      - key: AQARA_REFRESH_TOKEN
        sync: false
      - key: AQARA_OPEN_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FP2_DEVICE_ID
        sync: false
      - key: FP2_NAME
        value: Aqara FP2
      - key: FP2_MODEL
        value: PS-SO2RU
