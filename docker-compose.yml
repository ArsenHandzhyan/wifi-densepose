version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.render
    container_name: wifi-densepose-backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-wifi-densepose-local}
      - FP2_ENABLED=true
      - ENABLE_REAL_TIME_PROCESSING=false
      - PYTHONPATH=/app
    command: uvicorn src.app:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  fp2-monitor:
    build:
      context: .
      dockerfile: Dockerfile.render
    container_name: wifi-densepose-fp2-monitor
    depends_on:
      - backend
    environment:
      - AQARA_EMAIL=${AQARA_EMAIL}
      - AQARA_PASSWORD=${AQARA_PASSWORD}
      - AQARA_API_DOMAIN=${AQARA_API_DOMAIN}
      - AQARA_APP_ID=${AQARA_APP_ID}
      - AQARA_APP_KEY=${AQARA_APP_KEY}
      - AQARA_KEY_ID=${AQARA_KEY_ID}
      - AQARA_ACCESS_TOKEN=${AQARA_ACCESS_TOKEN}
      - AQARA_REFRESH_TOKEN=${AQARA_REFRESH_TOKEN}
      - AQARA_OPEN_ID=${AQARA_OPEN_ID}
      - FP2_DEVICE_ID=${FP2_DEVICE_ID}
      - FP2_NAME=${FP2_NAME}
      - FP2_MODEL=${FP2_MODEL}
    command: python scripts/fp2_aqara_cloud_monitor.py --backend http://backend:8000 --interval 2 --log-level INFO
    restart: unless-stopped

  ui:
    image: python:3.11-slim
    container_name: wifi-densepose-ui
    working_dir: /app/ui
    volumes:
      - .:/app
    command: python -m http.server 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
