version: '3.8'

services:
  # mDNS relay for HomeKit discovery
  mdns-relay:
    image: "ghcr.io/angelnu/mdns-repeater:latest"
    container_name: mdns-relay
    restart: unless-stopped
    network_mode: host
    environment:
      - hostNIC=en0
      - dockerNIC=br-
    cap_add:
      - NET_ADMIN
    volumes:
      - /var/run/dbus:/var/run/dbus
    command: ["en0", "br-"]
    
  # Home Assistant with full network access
  homeassistant:
    image: "ghcr.io/home-assistant/home-assistant:stable"
    container_name: homeassistant-full
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      - TZ=Europe/Moscow
    volumes:
      - ./.ha-core/config:/config
      - /run/dbus:/run/dbus:ro
    depends_on:
      - mdns-relay
    
  # WiFi-DensePose backend
  wifi-densepose:
    build: .
    container_name: wifi-densepose
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-dev-secret}
      - HA_URL=http://host.docker.internal:8123
      - HA_TOKEN=${HA_TOKEN:-}
      - FP2_ENABLED=true
      - FP2_ENTITY_ID=input_boolean.fp2_presence
    depends_on:
      - homeassistant
