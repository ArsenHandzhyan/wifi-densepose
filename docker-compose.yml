version: '3.8'

services:
  wifi-densepose:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: wifi-densepose-dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - wifi_densepose_logs:/app/logs
      - wifi_densepose_data:/app/data
      - wifi_densepose_models:/app/models
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=debug
      - RELOAD=true
      - ENABLE_TEST_ENDPOINTS=true
      - ENABLE_AUTHENTICATION=false
      - ENABLE_RATE_LIMITING=false
      - SECRET_KEY=${SECRET_KEY:-change-me-dev-secret}
      - POSTGRES_DB=${POSTGRES_DB:-wifi_densepose}
      - POSTGRES_USER=${POSTGRES_USER:-wifi_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me-postgres-password}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-wifi_user}:${POSTGRES_PASSWORD:-change-me-postgres-password}@postgres:5432/${POSTGRES_DB:-wifi_densepose}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change-me-redis-password}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-change-me-redis-password}@redis:6379/0
      - HA_URL=http://homeassistant:8123
      - HA_TOKEN=${HA_TOKEN:-}
      - FP2_ENTITY_ID=${FP2_ENTITY_ID:-input_boolean.fp2_presence}
    command: uvicorn src.app:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - postgres
      - redis
      - homeassistant
    networks:
      - wifi-densepose-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: wifi-densepose-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-wifi_densepose}
      - POSTGRES_USER=${POSTGRES_USER:-wifi_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me-postgres-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    networks:
      - wifi-densepose-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wifi-densepose-redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change-me-redis-password}
    command: /bin/sh -c 'exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"'
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - wifi-densepose-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" --raw incr ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: wifi-densepose-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus-config.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - wifi-densepose-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: wifi-densepose-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change-me-grafana-password}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    ports:
      - "3000:3000"
    networks:
      - wifi-densepose-network
    restart: unless-stopped
    depends_on:
      - prometheus

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: wifi-densepose-ha
    volumes:
      - ha_config:/config
    environment:
      - TZ=Europe/Moscow
    ports:
      - "8123:8123"
    networks:
      - wifi-densepose-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  homebridge:
    image: homebridge/homebridge:latest
    container_name: wifi-densepose-homebridge
    environment:
      - TZ=Europe/Moscow
    volumes:
      - ./homebridge:/var/lib/homebridge
    ports:
      - "8581:8581"
      - "51828:51828"
    networks:
      - wifi-densepose-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: wifi-densepose-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    networks:
      - wifi-densepose-network
    restart: unless-stopped
    depends_on:
      - wifi-densepose

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  ha_config:
  wifi_densepose_logs:
  wifi_densepose_data:
  wifi_densepose_models:

networks:
  wifi-densepose-network:
    driver: bridge
